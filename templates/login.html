<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Заметки</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="container">
        <div class="form-page" style="max-width: 400px; margin: 80px auto;">
            <h2>Вход в систему</h2>
            <p style="margin-bottom: 16px; color: #666;">Тестовый режим — введите ID пользователя</p>
            <form action="/login" method="POST">
                <input type="hidden" name="_csrf" value="{{.csrf}}">
                <div class="form-group">
                    <label for="user_id">ID пользователя</label>
                    <input type="number" id="user_id" name="user_id" value="1" min="1" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
