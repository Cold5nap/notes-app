п»ҝ{{define "login.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Р вҖҷРЎвҖҰР С•Р Т‘ РІРӮвҖқ Р вҖ”Р В°Р СҳР ВөРЎвҖҡР С”Р С‘</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="container">
        <div class="form-page" style="max-width: 400px; margin: 80px auto;">
            <h2>Р вҖҷРЎвҖҰР С•Р Т‘ Р РҶ РЎРғР С‘РЎРғРЎвҖҡР ВөР СҳРЎС“</h2>
            <p style="margin-bottom: 16px; color: #666;">Р СһР ВөРЎРғРЎвҖҡР С•Р РҶРЎвҖ№Р в„– РЎРӮР ВөР В¶Р С‘Р Сҳ РІРӮвҖқ Р РҶР РҶР ВөР Т‘Р С‘РЎвҖҡР Вө ID Р С—Р С•Р В»РЎРҠР В·Р С•Р РҶР В°РЎвҖҡР ВөР В»РЎРҸ</p>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="user_id">ID Р С—Р С•Р В»РЎРҠР В·Р С•Р РҶР В°РЎвҖҡР ВөР В»РЎРҸ</label>
                    <input type="number" id="user_id" name="user_id" value="1" min="1" required>
                </div>
                <button type="submit" class="btn btn-primary">Р вҖҷР С•Р в„–РЎвҖҡР С‘</button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
